##############################################################################
# GitHub Actions – CI/CD Pipeline
# coffee-dictionary → ECR → ECS Fargate (ap-southeast-2)
#
# Workflow:
#   1. On every PR:  lint + test + build Docker image (no push)
#   2. On merge to main:
#      a. Build + push Docker image to ECR (tagged with git SHA)
#      b. Run terraform plan
#      c. Apply terraform (updates ECS task definition → rolling deploy)
##############################################################################

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: coffee-dictionary
  ECS_CLUSTER: coffee-dictionary-production
  ECS_SERVICE: coffee-dictionary-production
  TF_WORKING_DIR: terraform/environments/production

permissions:
  id-token: write   # Required for OIDC auth to AWS (no long-lived keys)
  contents: read
  pull-requests: write  # For terraform plan PR comments

jobs:
  ##############################################################################
  # CI – runs on every PR and push
  ##############################################################################
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build TypeScript
        run: pnpm build

      # Validate the Dockerfile builds (don't push on PRs)
      - name: Build Docker image (validation only)
        run: |
          docker build -t coffee-dictionary:${{ github.sha }} .

  ##############################################################################
  # Terraform Plan – runs on PRs, posts plan as a comment
  ##############################################################################
  tf-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6'

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var="image_tag=${{ github.sha }}" \
            -no-color \
            -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n...(truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${truncated}\n\`\`\``
            });

  ##############################################################################
  # Deploy – runs on merge to main only
  ##############################################################################
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://api.coffeesyndicate.com  # Update with real domain

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "ecr_image=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build & push Docker image to ECR
        run: |
          docker build -t ${{ steps.meta.outputs.ecr_image }} .

          # Also tag as latest for reference (task definition always uses SHA)
          docker tag ${{ steps.meta.outputs.ecr_image }} \
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

          docker push ${{ steps.meta.outputs.ecr_image }}
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6'

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply \
            -var="image_tag=${{ steps.meta.outputs.image_tag }}" \
            -auto-approve

      # Wait for ECS rolling deployment to stabilise
      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }}

      - name: Deployment summary
        run: |
          echo "✅ Deployed image: ${{ steps.meta.outputs.ecr_image }}"
          echo "   Cluster: ${{ env.ECS_CLUSTER }}"
          echo "   Service: ${{ env.ECS_SERVICE }}"
